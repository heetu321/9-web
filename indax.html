<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Payment</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", "Segoe UI", sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at top, #0f172a, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Floating Lights */
.light {
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(0,255,200,0.25), transparent);
  filter: blur(120px);
  animation: float 12s infinite ease-in-out;
}

.light:nth-child(2) {
  background: radial-gradient(circle, rgba(124,58,237,0.25), transparent);
  left: 70%;
  top: 20%;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-60px); }
}

/* Card */
.container {
  position: relative;
  z-index: 2;
  width: 92%;
  max-width: 380px;
  padding: 30px;
  border-radius: 22px;
  backdrop-filter: blur(25px);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  text-align: center;
  color: #fff;
  box-shadow: 0 15px 60px rgba(0,0,0,0.7);
}

/* Glow border */
.container::before {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: 22px;
  background: linear-gradient(120deg, #00f5ff, #7c3aed, #00ffae);
  filter: blur(18px);
  opacity: 0.35;
  z-index: -1;
}

h1 {
  font-size: 24px;
}

.sub {
  font-size: 13px;
  color: #aaa;
  margin-bottom: 20px;
}

.amount {
  font-size: 42px;
  font-weight: 700;
  color: #00ffae;
  text-shadow: 0 0 20px rgba(0,255,174,0.6);
  margin: 20px 0;
}

/* Buttons */
.btn {
  display: block;
  padding: 15px;
  margin: 10px 0;
  border-radius: 14px;
  text-decoration: none;
  font-weight: 600;
  transition: 0.25s;
  position: relative;
  overflow: hidden;
}

.btn::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
  opacity: 0;
  transition: 0.3s;
}

.btn:hover::after {
  opacity: 1;
}

.btn:hover {
  transform: translateY(-2px) scale(1.02);
}

/* Button colors */
.upi { background: linear-gradient(135deg,#00c6ff,#0072ff); color:#fff;}
.gpay { background: #000; color:#fff;}
.phonepe { background: #5f259f; color:#fff;}

/* QR */
.qr img {
  width: 150px;
  margin-top: 15px;
  border-radius: 12px;
}

.note {
  font-size: 12px;
  color: #aaa;
  margin-top: 12px;
}

.secure {
  margin-top: 10px;
  color: #00ffae;
  font-size: 13px;
}

/* Processing Overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(10px);
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}

.overlay.active {
  opacity: 1;
  pointer-events: all;
}

.loader {
  width: 60px;
  height: 60px;
  border: 4px solid transparent;
  border-top: 4px solid #00ffae;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.processing-text {
  color: #fff;
  margin-top: 15px;
  text-align: center;
}
</style>
</head>

<body>

<div class="light"></div>
<div class="light"></div>

<div class="container">
  <h1>Secure Payment</h1>
  <div class="sub">UPI • Fast & Trusted</div>

  <div class="amount">₹9</div>

  <a href="#" class="btn upi" onclick="pay('upi://pay?pa=8469626550@fam&pn=Payment&am=9&cu=INR')">
    Pay via UPI
  </a>

  <a href="#" class="btn gpay" onclick="pay('gpay://upi/pay?pa=8469626550@fam&pn=Payment&am=9&cu=INR')">
    Google Pay
  </a>

  <a href="#" class="btn phonepe" onclick="pay('phonepe://pay?pa=8469626550@fam&pn=Payment&am=9&cu=INR')">
    PhonePe
  </a>

  <div class="note">Use any UPI app or scan below</div>

  <div class="qr">
    <img src="qr.png">
  </div>

  <div class="secure">🔒 Secure UPI Payment</div>
</div>

<!-- Processing Screen -->
<div class="overlay" id="overlay">
  <div>
    <div class="loader"></div>
    <div class="processing-text">Redirecting to payment...</div>
  </div>
</div>

<script>
function pay(link){
  const overlay = document.getElementById("overlay");
  overlay.classList.add("active");

  setTimeout(() => {
    window.location.href = link;
  }, 800);
}
</script>

</body>
</html>
